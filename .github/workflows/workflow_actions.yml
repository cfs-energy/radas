name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Use non-interactive matplotlib backend, to prevent the workflow from
  # trying to make interactive windows.
  MPLBACKEND: Agg

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- JOB 1: RUN TESTS ---
  pytest:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v5

      - name: Install Poetry
        run: pipx install "poetry>=2,<3"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'poetry'

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run Pytest
        run: poetry run pytest

      - name: Smoke test package installation
        run: |
          poetry build
          python -m venv test_env
          source test_env/bin/activate
          pip install dist/*.whl
          radas_config -o ./new_config.yaml
          radas -s hydrogen -c ./new_config.yaml
  
  # --- JOB 2: RUN RADAS COMMAND, CHECK IT WORKS WITH DEFAULT CONFIG ---
  test_radas:
    name: Test radas command
    runs-on: ubuntu-latest
    if: (github.event_name == 'release' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v5

      - name: Install Poetry
        run: pipx install "poetry>=2,<3"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'poetry'

      - name: Install dependencies
        run: poetry install

      - name: Run radas command
        run: poetry run radas -vvv
      
  # --- JOB 3: BUILD RELEASE ARTIFACTS ---
  build_release:
    name: Build Release
    needs: [pytest, test_radas]
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Poetry
        run: pipx install "poetry>=2,<3"

      - name: Build distributions
        run: poetry build

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: pypi-dist
          path: dist/
          retention-days: 1

  # --- JOB 4: PUBLISH TO PYPI ---
  publish:
    name: Publish to PyPI
    needs: build_release
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment:
      name: pypi-publish
      url: https://pypi.org/project/radas/
    permissions:
      id-token: write 
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          name: pypi-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/